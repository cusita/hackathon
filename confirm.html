<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Transferencia exitosa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="confirm-screen">
      <div class="confirm-bg" aria-hidden="true">
        <!-- globos decorativos no funcionales -->
        <div
          class="decor-balloon b0"
          style="left: 6%; bottom: 8%; width: 84px; height: 112px"
        ></div>
        <div
          class="decor-balloon b3"
          style="left: 20%; bottom: 20%; width: 64px; height: 90px"
        ></div>
        <div
          class="decor-balloon b5"
          style="left: 78%; bottom: 16%; width: 72px; height: 96px"
        ></div>
        <div
          class="decor-balloon b8"
          style="left: 46%; bottom: 10%; width: 88px; height: 120px"
        ></div>
        <div class="confetti-decor">
          <!-- generar muchos fragmentos de confeti para decoración -->
          <span class="c" style="left: 8%; --d: 0s"></span>
          <span class="c" style="left: 18%; --d: 0.2s"></span>
          <span class="c" style="left: 26%; --d: 0.4s"></span>
          <span class="c" style="left: 34%; --d: 0.1s"></span>
          <span class="c" style="left: 42%; --d: 0.3s"></span>
          <span class="c" style="left: 52%; --d: 0.15s"></span>
          <span class="c" style="left: 62%; --d: 0.25s"></span>
          <span class="c" style="left: 72%; --d: 0.05s"></span>
          <span class="c" style="left: 82%; --d: 0.22s"></span>
          <span class="c" style="left: 92%; --d: 0.12s"></span>
        </div>
      </div>
      <div class="confirm-card">
        <h1>Transacción exitosa</h1>
        <p class="msg">Se ha enviado el monto correctamente.</p>
        <div class="details">
          <div>
            <strong>Cuenta destino:</strong> <span id="confirmAccount">—</span>
          </div>
          <div>
            <strong>Valor enviado:</strong> <span id="confirmValue">—</span>
          </div>
        </div>
        <div class="actions">
          <a href="index.html" class="btn">Volver al juego</a>
        </div>
      </div>
    </main>

    <script type="module" src="js/confirm.js"></script>
  </body>
</html>
